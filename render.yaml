services:
  - type: web
    name: mon-projet-fin-django
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    releaseCommand: python manage.py migrate --noinput
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: mon-projet-fin-django.onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: mon-projet-fin-django-db
          property: connectionString

databases:
  - name: mon-projet-fin-django-db
    databaseName: monprojetfindjango
    user: monprojetfindjango
    plan: free
