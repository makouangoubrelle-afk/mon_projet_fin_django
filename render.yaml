services:
  - type: web
    name: mon-projet-fin-django
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      cd sih-frontend && npm install && npm run build && cd ..
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
      python manage.py seed_personal_logins || true
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: mon-projet-fin-django.onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: mon-projet-fin-django-db
          property: connectionString

databases:
  - name: mon-projet-fin-django-db
    databaseName: monprojetfindjango
    user: monprojetfindjango
    plan: free
